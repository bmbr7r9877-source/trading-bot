name: paper-trading

on:
  schedule:
    - cron: "10 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet pandas numpy requests
      - run: python paper_trader.py
      - name: Durumu commitle
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add paper/state.json
          git diff --cached --quiet || git commit -m "paper: $(date -u '+%Y-%m-%d %H:%M') UTC dongusu"
          git pull --rebase origin main
          git push
